<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SESSIONARY — ENTER YOUR KEY</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #080808;
    --carbon: #111111;
    --carbon-mid: #1a1a1a;
    --carbon-light: #242424;
    --gold: #C9A84C;
    --gold-light: #E8C76A;
    --gold-dim: #8a6e2e;
    --red: #c0392b;
    --white: #f0ede8;
    --white-dim: rgba(240,237,232,0.4);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; background: var(--black); color: var(--white); font-family: 'Barlow Condensed', sans-serif; overflow: hidden; cursor: default; user-select: none; }
  .bg { position: fixed; inset: 0; z-index: 0; background: radial-gradient(ellipse 60% 50% at 50% 100%, rgba(201,168,76,0.06) 0%, transparent 70%), var(--black); }
  .bg::before { content: ''; position: absolute; inset: 0; background-image: repeating-linear-gradient(45deg, transparent, transparent 2px, rgba(255,255,255,0.012) 2px, rgba(255,255,255,0.012) 4px), repeating-linear-gradient(-45deg, transparent, transparent 2px, rgba(255,255,255,0.008) 2px, rgba(255,255,255,0.008) 4px); pointer-events: none; }
  .scanlines { position: fixed; inset: 0; z-index: 1; background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.18) 3px, rgba(0,0,0,0.18) 4px); pointer-events: none; }
  .wrapper { position: relative; z-index: 2; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; animation: fadeIn 1.4s ease both; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  .badge-wrap { display: flex; flex-direction: column; align-items: center; margin-bottom: 2.5rem; }
  .badge { position: relative; width: 80px; height: 90px; display: flex; align-items: center; justify-content: center; margin-bottom: 1.4rem; }
  .badge svg { width: 100%; height: 100%; filter: drop-shadow(0 0 18px rgba(201,168,76,0.35)); }
  .badge-inner { position: absolute; font-family: 'Bebas Neue', sans-serif; font-size: 0.65rem; letter-spacing: 0.18em; color: var(--gold-light); top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; line-height: 1.1; }
  .wordmark { font-family: 'Bebas Neue', sans-serif; font-size: clamp(3.5rem, 10vw, 6rem); letter-spacing: 0.12em; line-height: 1; background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold) 50%, var(--gold-dim) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .tagline { font-family: 'Barlow Condensed', sans-serif; font-size: 0.72rem; font-weight: 300; letter-spacing: 0.45em; color: var(--white-dim); text-transform: uppercase; margin-top: 0.5rem; }
  .card { width: 100%; max-width: 440px; background: linear-gradient(135deg, var(--carbon) 0%, var(--carbon-mid) 100%); border: 1px solid rgba(201,168,76,0.2); padding: 2.2rem 2.4rem 2rem; position: relative; clip-path: polygon(0 0, calc(100% - 20px) 0, 100% 20px, 100% 100%, 20px 100%, 0 calc(100% - 20px)); }
  .card-header { margin-bottom: 1.5rem; }
  .card-label { font-size: 0.65rem; font-weight: 600; letter-spacing: 0.35em; color: var(--gold); text-transform: uppercase; margin-bottom: 0.4rem; }
  .card-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.7rem; letter-spacing: 0.08em; color: var(--white); }
  .card-sub { font-size: 0.78rem; font-weight: 300; color: var(--white-dim); margin-top: 0.5rem; }
  .input-wrap { position: relative; margin-bottom: 1rem; }
  .key-input { width: 100%; background: var(--carbon-light); border: 1px solid rgba(201,168,76,0.25); border-bottom: 2px solid var(--gold-dim); color: var(--gold-light); font-family: 'Share Tech Mono', monospace; font-size: 1.05rem; letter-spacing: 0.22em; padding: 0.9rem 1rem 0.85rem 3rem; outline: none; text-transform: uppercase; }
  .key-input:focus { border-color: var(--gold); border-bottom-color: var(--gold); }
  .key-input.error { border-color: var(--red); border-bottom-color: var(--red); }
  .key-input.success { border-color: #2ecc71; border-bottom-color: #2ecc71; }
  .input-icon { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); opacity: 0.5; }
  .btn { width: 100%; background: linear-gradient(135deg, #b8922e 0%, var(--gold) 50%, #e8c76a 100%); border: none; color: #0a0a0a; font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; letter-spacing: 0.25em; padding: 0.9rem 1rem; cursor: pointer; clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 10px 100%, 0 calc(100% - 10px)); }
  .status { font-family: 'Share Tech Mono', monospace; font-size: 0.7rem; letter-spacing: 0.12em; text-align: center; min-height: 1.2rem; color: transparent; }
  .status.show-error { color: var(--red); }
  .status.show-success { color: #2ecc71; }
  .success-screen { position: fixed; inset: 0; z-index: 50; background: var(--black); display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.6s ease; }
  .success-screen.active { opacity: 1; pointer-events: all; }
  .success-title { font-family: 'Bebas Neue', sans-serif; font-size: 2.5rem; color: var(--gold); letter-spacing: 0.15em; }
</style>
</head>
<body>
<div class="bg"></div>
<div class="scanlines"></div>
<div class="success-screen" id="successScreen">
  <div class="success-title">ACCESS GRANTED</div>
</div>
<div class="wrapper">
  <div class="badge-wrap">
    <div class="badge">
      <svg viewBox="0 0 80 90" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M40 4 L74 18 L74 48 C74 66 58 80 40 86 C22 80 6 66 6 48 L6 18 Z" fill="#111" stroke="#C9A84C" stroke-width="1.5"/>
      </svg>
      <div class="badge-inner">SESSION<br>ARIES</div>
    </div>
    <div class="wordmark">SESSIONARY</div>
    <div class="tagline">Private · Sovereign · 50 Seats</div>
  </div>
  <div class="card">
    <div class="card-header">
      <div class="card-label">Access Protocol</div>
      <div class="card-title">ENTER YOUR KEY</div>
      <div class="card-sub">You were given a one-time access key. Enter it below to unlock the environment.</div>
    </div>
    <div class="input-wrap">
      <div class="input-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#C9A84C" stroke-width="1.5">
          <path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/>
        </svg>
      </div>
      <input id="keyInput" class="key-input" type="text" placeholder="XXXX-XXXX-XXXX-XXXX" maxlength="19" oninput="formatKey(this)" />
    </div>
    <div class="status" id="status"></div>
    <br>
    <button class="btn" onclick="submitKey()">AUTHENTICATE &nbsp;→</button>
  </div>
</div>
<script>
  const VALID_KEYS = new Set(['BEEK-OUTS-IDE1-2026', 'DEMO-KEY2-TEST-0001']);
  const USED_KEYS = new Set();
  function formatKey(input) {
    let val = input.value.replace(/[^A-Z0-9]/gi, '').toUpperCase();
    let formatted = '';
    for (let i = 0; i < val.length && i < 16; i++) {
      if (i > 0 && i % 4 === 0) formatted += '-';
      formatted += val[i];
    }
    input.value = formatted;
  }
  function setStatus(msg, type) {
    const el = document.getElementById('status');
    el.textContent = msg;
    el.className = 'status' + (type ? ` show-${type}` : '');
  }
  function submitKey() {
    const input = document.getElementById('keyInput');
    const val = input.value.trim().toUpperCase();
    if (val.length < 19) {
      input.classList.add('error');
      setStatus('// INVALID FORMAT', 'error');
      return;
    }
    if (VALID_KEYS.has(val) && !USED_KEYS.has(val)) {
      USED_KEYS.add(val);
      input.classList.add('success');
      setStatus('// AUTHENTICATING...', 'success');
      document.getElementById('successScreen').classList.add('active');
      setTimeout(() => { window.location.href = 'dashboard.html'; }, 1500);
    } else {
      input.classList.add('error');
      setStatus('// KEY NOT RECOGNIZED', 'error');
    }
  }
</script>
</body>
</html>
